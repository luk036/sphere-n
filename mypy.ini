[mypy]
python_version = 3.12
warn_unused_configs = True
exclude = docs

[mypy-setuptools.*]
ignore_missing_imports = True

[mypy-Cython.*]
ignore_missing_imports = True

[mypy-json.*]
ignore_missing_imports = True

[mypy-sphinx]
ignore_missing_imports = True

[mypy-numba]
ignore_missing_imports = True

[mypy-sphinx.*]
ignore_missing_imports = True
